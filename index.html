<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>금은미 — 얼마나 이득인지 확인하세요</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:#f7f6f3;color:#1a1a1a;-webkit-font-smoothing:antialiased}

.bar{background:#1c1510;padding:10px 16px;text-align:center;position:relative}
.bar .ev{font-size:.72em;color:#d4af37;font-weight:700;letter-spacing:.3px;margin-bottom:4px}
.bar .prices{display:flex;justify-content:center;gap:24px;flex-wrap:wrap}
.bar .prices .p{text-align:center}
.bar .prices .p .l{font-size:.52em;color:rgba(255,255,255,.35);font-weight:600;letter-spacing:.8px}
.bar .prices .p .v{font-size:.85em;font-weight:800;color:rgba(255,255,255,.8);margin-top:1px}
.bar .prices .p .v.gc{color:#d4af37}

/* 톱니바퀴 */
.gear-btn{position:absolute;top:8px;right:12px;background:none;border:none;color:rgba(255,255,255,.15);font-size:1.2em;cursor:pointer;padding:4px;transition:color .2s}
.gear-btn:hover{color:rgba(255,255,255,.4)}

/* 관리자 패널 */
.admin-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:1000;justify-content:center;align-items:center}
.admin-overlay.show{display:flex}
.admin-panel{background:#fff;border-radius:16px;padding:24px;width:90%;max-width:380px;box-shadow:0 8px 32px rgba(0,0,0,.3)}
.admin-panel h3{font-size:.9em;font-weight:700;margin-bottom:16px;color:#1a1a1a}
.admin-panel .field{margin-bottom:14px}
.admin-panel .field label{font-size:.72em;color:#888;display:block;margin-bottom:4px}
.admin-panel .field input{width:100%;padding:10px 12px;border:2px solid #e0dbd3;border-radius:8px;font-size:1em;font-weight:700;font-family:'Noto Sans KR',sans-serif;outline:none}
.admin-panel .field input:focus{border-color:#d4af37}
.admin-panel .field .hint{font-size:.62em;color:#aaa;margin-top:3px}
.admin-panel .field .hint a{color:#0a5e8a;text-decoration:underline}
.admin-panel .btn-row{display:flex;gap:8px;margin-top:16px}
.admin-panel .btn{flex:1;padding:10px;border:none;border-radius:8px;font-size:.82em;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
.admin-panel .btn.save{background:#d4af37;color:#fff}
.admin-panel .btn.save:hover{background:#b8941c}
.admin-panel .btn.close{background:#f0ece6;color:#666}
.admin-panel .btn.close:hover{background:#e0dbd3}
.admin-panel .status{font-size:.7em;margin-top:10px;padding:8px;border-radius:6px;display:none}
.admin-panel .status.ok{display:block;background:#e6f9ee;color:#0d9448}
.admin-panel .status.err{display:block;background:#fde8e8;color:#c53030}
.admin-panel .pw-gate{margin-bottom:16px}
.admin-panel .pw-gate input{width:100%;padding:10px 12px;border:2px solid #e0dbd3;border-radius:8px;font-size:.9em;font-family:'Noto Sans KR',sans-serif;outline:none}
.admin-panel .pw-gate .unlock{margin-top:8px;width:100%;padding:10px;background:#1a1a1a;color:#fff;border:none;border-radius:8px;font-size:.82em;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
.admin-fields{display:none}
.admin-fields.unlocked{display:block}

.wrap{max-width:440px;margin:0 auto;padding:16px 14px 32px}
.input-box{background:#fff;border-radius:14px;padding:18px;text-align:center;box-shadow:0 1px 8px rgba(0,0,0,.04);margin-bottom:14px}
.input-box .title{font-size:.85em;font-weight:700;margin-bottom:10px}
.input-row{display:inline-flex;align-items:center;gap:6px}
.input-row input{width:110px;font-size:2.2em;font-weight:900;text-align:center;border:2px solid #e0dbd3;border-radius:10px;padding:6px;background:#faf9f6;color:#1a1a1a;font-family:'Noto Sans KR',sans-serif;outline:none}
.input-row input:focus{border-color:#d4af37}
.input-row span{font-size:1.1em;font-weight:700;color:#999}

.steps{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 1px 8px rgba(0,0,0,.04)}
.step{padding:16px 20px;border-bottom:1px solid #f2efe9;display:flex;justify-content:space-between;align-items:center}
.step:last-child{border:none}
.step .left{flex:1}
.step .num{font-size:.6em;font-weight:900;color:#fff;width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;margin-right:6px;vertical-align:middle}
.step .num.n1{background:#8b6914}
.step .num.n2{background:#1a1a1a}
.step .num.n3{background:#0a5e8a}
.step .label{font-size:.88em;font-weight:600;display:inline}
.step .desc{font-size:.68em;color:#999;margin-top:2px}
.step .right{text-align:right}
.step .price{font-size:1.35em;font-weight:900}
.step .price.gold{color:#8b6914}
.step .price.dark{color:#1a1a1a}
.step .price.blue{color:#0a5e8a}

.benefit{margin:14px 0;border-radius:14px;overflow:hidden}
.ben-row{padding:14px 20px;display:flex;justify-content:space-between;align-items:center}
.ben-gold{background:linear-gradient(135deg,#fef8e8,#fdf0c8);border-bottom:1px solid #e8d48b}
.ben-save{background:linear-gradient(135deg,#e8f7ee,#d1f5de);border-bottom:1px solid #a7e8b8}
.ben-pb{background:linear-gradient(135deg,#eef6ff,#dbeeff)}
.ben-row .left .title2{font-size:.82em;font-weight:700}
.ben-row .left .sub2{font-size:.62em;color:#888;margin-top:1px}
.ben-row .right .amt{font-size:1.4em;font-weight:900}
.ben-row .right .amt.gd{color:#8b6914}
.ben-row .right .amt.gn{color:#0d9448}
.ben-row .right .amt.bl{color:#0a5e8a}

.compare-box{background:#fff;border-radius:14px;padding:16px 20px;box-shadow:0 1px 8px rgba(0,0,0,.04);margin-top:14px}
.compare-box .ch{font-size:.72em;font-weight:700;color:#999;margin-bottom:8px}
.compare-box .crow{display:flex;justify-content:space-between;padding:5px 0;font-size:.82em}
.compare-box .crow .k{color:#888}
.compare-box .crow .v{font-weight:600}
.compare-box .crow .v.pk{color:#b91c63}
.compare-box .highlight{margin-top:8px;padding:10px;background:#e8f4fc;border-radius:8px;font-size:.78em;color:#0a5e8a;line-height:1.5;text-align:center}
.compare-box .highlight b{color:#064e73}

.foot{font-size:.55em;color:#bbb;text-align:center;padding:16px;line-height:1.6}

@media(max-width:440px){.step .price{font-size:1.15em}.ben-row .right .amt{font-size:1.15em}}
</style>
</head>
<body>

<div class="bar">
<div class="ev">매달 마지막주 한정 · 금은미 이벤트</div>
<div class="prices">
<div class="p"><div class="l">24K 1돈 살때</div><div class="v gc" id="t1">불러오는 중...</div></div>
<div class="p"><div class="l">14K 1g</div><div class="v" id="t2">-</div></div>
<div class="p"><div class="l">기준일</div><div class="v" id="t3">-</div></div>
</div>
<button class="gear-btn" id="gearBtn" title="관리자">⚙️</button>
</div>

<!-- 관리자 패널 -->
<div class="admin-overlay" id="adminOverlay">
<div class="admin-panel">
<h3>⚙️ 금시세 관리</h3>
<div class="pw-gate" id="pwGate">
<input type="password" id="pwInput" placeholder="관리자 비밀번호">
<button class="unlock" id="pwBtn">확인</button>
</div>
<div class="admin-fields" id="adminFields">
<div class="field">
<label>24K 순금 1돈 살때 (VAT포함)</label>
<input type="number" id="adminDon" placeholder="예: 1063000">
<div class="hint">
<a href="https://www.koreagoldx.co.kr/" target="_blank">한국금거래소 →</a> 메인 시세표에서 순금 살때 가격 확인
</div>
</div>
<div class="field">
<label>기준일 (선택)</label>
<input type="date" id="adminDate">
</div>
<div class="btn-row">
<button class="btn close" id="adminClose">닫기</button>
<button class="btn save" id="adminSave">저장 · 즉시 반영</button>
</div>
<div class="status" id="adminStatus"></div>
</div>
</div>
</div>

<div class="wrap">
<div class="input-box">
<div class="title">제품 무게를 입력하세요 (14K)</div>
<div class="input-row">
<input type="number" id="gIn" value="1.07" min="0.1" max="30" step="0.01">
<span>g</span>
</div>
</div>
<div class="steps" id="steps"></div>
<div class="benefit" id="benefit"></div>
<div class="compare-box" id="compare"></div>
<div class="foot">
모든 가격 부가세(VAT) 포함<br>
14K 시세 = 24K 살때 기준 × 순도 0.585 × 해리 1.1<br>
페이백 10% 자동적용 · 포인트는 소잇 내 사용 가능
</div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

<script>
// ===== Firebase 설정 =====
// ★★★ 아래 firebaseConfig를 본인의 Firebase 프로젝트로 교체하세요 ★★★
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "000000000000",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ===== 상수 =====
const H=0.585*1.1, ALP=0.8493, LAB=20876, MP=1.9, PBR=0.10;
const ADMIN_PW = 'soit2026'; // 관리자 비밀번호 (변경하세요)
let don = 1063000; // 기본값
let priceDate = '';
const fmt = n => Math.round(n).toLocaleString('ko-KR');

// URL 파라미터 (폴백용)
const params = new URLSearchParams(location.search);
if(params.get('g')) document.getElementById('gIn').value = params.get('g');
if(params.get('don')) don = parseInt(params.get('don'));
if(params.get('date')) priceDate = params.get('date');

// ===== Firestore에서 금시세 불러오기 =====
async function loadPrice() {
  try {
    const doc = await db.collection('settings').doc('goldPrice').get();
    if(doc.exists) {
      const data = doc.data();
      if(data.don) don = data.don;
      if(data.date) priceDate = data.date;
      calc();
    }
  } catch(e) {
    console.log('Firestore 조회 실패, 기본값 사용:', e);
  }
  calc();
}

// ===== 관리자: Firestore에 금시세 저장 =====
async function savePrice(newDon, newDate) {
  try {
    await db.collection('settings').doc('goldPrice').set({
      don: newDon,
      date: newDate,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    don = newDon;
    priceDate = newDate;
    calc();
    return true;
  } catch(e) {
    console.error('저장 실패:', e);
    return false;
  }
}

// ===== 계산 + 화면 렌더링 =====
function calc(){
  var w = parseFloat(document.getElementById('gIn').value) || 1.0;
  var g24 = don / 3.75, g14 = g24 * H;

  document.getElementById('t1').textContent = fmt(don) + '원';
  document.getElementById('t2').textContent = fmt(g14) + '원';
  document.getElementById('t3').textContent = priceDate || '-';

  var goldVal = g14 * w;
  var jewelVal = goldVal + LAB;
  var supply = (g14 * w + LAB) * ALP;
  var sp = supply * MP;
  var cash = sp * 0.5;
  var pb = sp * PBR;
  var diffGold = goldVal - cash;
  var shopPrice = jewelVal * 2;
  var diffShop = shopPrice - cash;

  document.getElementById('steps').innerHTML =
    '<div class="step">' +
      '<div class="left"><span class="num n1">1</span><div class="label">소잇 판매가</div><div class="desc">금은미 이벤트가</div></div>' +
      '<div class="right"><div class="price dark">' + fmt(sp) + '원</div></div>' +
    '</div>' +
    '<div class="step">' +
      '<div class="left"><span class="num n2">2</span><div class="label">14K ' + w + 'g 금 소매가</div><div class="desc">한국금거래소 기준 순수 금값</div></div>' +
      '<div class="right"><div class="price gold">' + fmt(goldVal) + '원</div></div>' +
    '</div>' +
    '<div class="step" style="background:#f0fdf4">' +
      '<div class="left"><span class="num n3">3</span><div class="label">포인트 50% 적용 후 현금</div><div class="desc">내가 실제로 내는 돈</div></div>' +
      '<div class="right"><div class="price blue">' + fmt(cash) + '원</div></div>' +
    '</div>';

  var goldLabel = diffGold > 0 ? '금값보다 저렴' : '금값과의 차이';
  var goldSign = diffGold > 0 ? '-' : '+';

  document.getElementById('benefit').innerHTML =
    '<div class="ben-row ben-gold">' +
      '<div class="left"><div class="title2">' + goldLabel + '</div><div class="sub2">금값 ' + fmt(goldVal) + '원 vs 내 현금 ' + fmt(cash) + '원</div></div>' +
      '<div class="right"><div class="amt gd">' + goldSign + fmt(Math.abs(diffGold)) + '원</div></div>' +
    '</div>' +
    '<div class="ben-row ben-save">' +
      '<div class="left"><div class="title2">시중 금은방 대비 절약</div><div class="sub2">시중 예상가 ' + fmt(shopPrice) + '원 vs 내 현금</div></div>' +
      '<div class="right"><div class="amt gn">-' + fmt(diffShop) + '원</div></div>' +
    '</div>' +
    '<div class="ben-row ben-pb">' +
      '<div class="left"><div class="title2">페이백 10% 적립</div><div class="sub2">다음 이벤트에 사용 가능</div></div>' +
      '<div class="right"><div class="amt bl">+' + fmt(pb) + 'P</div></div>' +
    '</div>';

  var bottomMsg = diffGold > 0
    ? '금만 사도 <b>' + fmt(goldVal) + '원</b>인데<br>소잇에서는 <b>주얼리 완제품</b>을 현금 <b>' + fmt(cash) + '원</b>에!'
    : '현금 <b>' + fmt(cash) + '원</b>에 주얼리 완제품을 가져가고<br>페이백 <b>' + fmt(pb) + 'P</b>까지 돌려받으세요';

  document.getElementById('compare').innerHTML =
    '<div class="ch">실제 주얼리 가치 참고</div>' +
    '<div class="crow"><span class="k">14K 금값 (' + w + 'g)</span><span class="v">' + fmt(goldVal) + '원</span></div>' +
    '<div class="crow"><span class="k">+ 공임 (디자인·제작)</span><span class="v">~' + fmt(LAB) + '원</span></div>' +
    '<div class="crow"><span class="k">주얼리 원가</span><span class="v pk">' + fmt(jewelVal) + '원</span></div>' +
    '<div class="crow"><span class="k">시중 금은방 예상가</span><span class="v">' + fmt(shopPrice) + '원~</span></div>' +
    '<div class="highlight">' + bottomMsg + '</div>';
}

// ===== 관리자 UI 이벤트 =====
var gearBtn = document.getElementById('gearBtn');
var overlay = document.getElementById('adminOverlay');
var pwGate = document.getElementById('pwGate');
var pwInput = document.getElementById('pwInput');
var pwBtn = document.getElementById('pwBtn');
var adminFields = document.getElementById('adminFields');
var adminClose = document.getElementById('adminClose');
var adminSave = document.getElementById('adminSave');
var adminStatus = document.getElementById('adminStatus');

gearBtn.addEventListener('click', function(){
  overlay.classList.add('show');
  pwGate.style.display = 'block';
  adminFields.classList.remove('unlocked');
  pwInput.value = '';
  adminStatus.className = 'status';
  pwInput.focus();
});

overlay.addEventListener('click', function(e){
  if(e.target === overlay) {
    overlay.classList.remove('show');
  }
});

pwBtn.addEventListener('click', function(){
  if(pwInput.value === ADMIN_PW) {
    pwGate.style.display = 'none';
    adminFields.classList.add('unlocked');
    document.getElementById('adminDon').value = don;
    document.getElementById('adminDate').value = priceDate || new Date().toISOString().slice(0,10);
  } else {
    pwInput.value = '';
    pwInput.placeholder = '비밀번호가 틀립니다';
  }
});

pwInput.addEventListener('keydown', function(e){
  if(e.key === 'Enter') pwBtn.click();
});

adminClose.addEventListener('click', function(){
  overlay.classList.remove('show');
});

adminSave.addEventListener('click', async function(){
  var newDon = parseInt(document.getElementById('adminDon').value);
  var newDate = document.getElementById('adminDate').value;
  if(!newDon || newDon < 100000) {
    adminStatus.className = 'status err';
    adminStatus.textContent = '금액을 정확히 입력해주세요';
    return;
  }
  adminSave.textContent = '저장 중...';
  var ok = await savePrice(newDon, newDate);
  if(ok) {
    adminStatus.className = 'status ok';
    adminStatus.textContent = '저장 완료! 24K 1돈 ' + fmt(newDon) + '원 (' + newDate + ') 반영됨';
    adminSave.textContent = '저장 · 즉시 반영';
    setTimeout(function(){ overlay.classList.remove('show'); }, 1500);
  } else {
    adminStatus.className = 'status err';
    adminStatus.textContent = '저장 실패. Firebase 설정을 확인하세요.';
    adminSave.textContent = '저장 · 즉시 반영';
  }
});

// ===== 무게 입력 이벤트 =====
document.getElementById('gIn').addEventListener('input', calc);

// ===== 시작 =====
loadPrice();
</script>
</body>
</html>
